<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>ZERO_DAY: Защитники сети</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #010208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    .splash-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,220,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,220,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
      animation: splashGrid 3s ease-in-out infinite alternate;
    }
    @keyframes splashGrid {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }
    .splash-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(60px);
      pointer-events: none;
    }
    .splash-orb-a {
      width: 300px; height: 300px;
      top: 10%; left: -80px;
      background: radial-gradient(circle, rgba(0,100,255,0.35), transparent 70%);
      animation: splashDrift 6s ease-in-out infinite;
    }
    .splash-orb-b {
      width: 250px; height: 250px;
      bottom: 15%; right: -60px;
      background: radial-gradient(circle, rgba(140,0,255,0.28), transparent 70%);
      animation: splashDrift 8s ease-in-out infinite reverse;
    }
    @keyframes splashDrift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.1); }
    }
    .splash-logo-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 8px;
    }
    .splash-eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(0,220,255,0.7);
      margin-bottom: 12px;
      animation: fadeUp 0.6s ease both 0.2s;
    }
    .splash-dot {
      width: 6px; height: 6px;
      border-radius: 999px;
      background: #00ffb3;
      box-shadow: 0 0 10px #00ffb3, 0 0 30px rgba(0,255,179,0.5);
      animation: splashPulse 1.8s ease-in-out infinite;
    }
    @keyframes splashPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.75); }
    }
    .splash-logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(38px, 12vw, 56px);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, #00dcff 0%, #0066ff 45%, #00ffb3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      filter: drop-shadow(0 0 30px rgba(0,220,255,0.4));
      animation: fadeUp 0.6s ease both 0.35s;
    }
    .splash-sub {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: rgba(232,244,255,0.6);
      letter-spacing: 0.06em;
      margin-top: 8px;
      animation: fadeUp 0.6s ease both 0.5s;
    }
    .splash-loader {
      position: relative;
      z-index: 2;
      width: 180px;
      height: 3px;
      background: rgba(0,220,255,0.12);
      border-radius: 999px;
      margin-top: 40px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both 0.7s;
    }
    .splash-loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00dcff, #0066ff);
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(0,220,255,0.8);
      transition: width 0.1s linear;
    }
    .splash-status {
      position: relative;
      z-index: 2;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      color: rgba(0,220,255,0.5);
      letter-spacing: 0.1em;
      margin-top: 10px;
      height: 16px;
      animation: fadeUp 0.4s ease both 0.8s;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-grid"></div>
    <div class="splash-orb splash-orb-a"></div>
    <div class="splash-orb splash-orb-b"></div>
    <div class="splash-logo-wrap">
      <div class="splash-eyebrow"><span class="splash-dot"></span>SOC TRAINING SYSTEM</div>
      <div class="splash-logo">ZERO_DAY</div>
      <div class="splash-sub">Защитники сети</div>
    </div>
    <div class="splash-loader"><div class="splash-loader-bar" id="splashBar"></div></div>
    <div class="splash-status" id="splashStatus">Инициализация...</div>
  </div>

  <div id="app" class="app"></div>
  <script src="./runtime.js"></script>
  <script src="./mockState.js"></script>

  <!-- Splash controller (до app.js) -->
  <script>
    (function() {
      const bar = document.getElementById('splashBar');
      const status = document.getElementById('splashStatus');
      const messages = [
        'Инициализация...',
        'Загрузка карты города...',
        'Подключение к SOC...',
        'Калибровка угроз...',
        'Готово к патрулированию'
      ];
      let progress = 0;
      let msgIdx = 0;
      const tick = setInterval(() => {
        progress += Math.random() * 18 + 6;
        if (progress >= 100) { progress = 100; clearInterval(tick); }
        bar.style.width = progress + '%';
        const newIdx = Math.min(messages.length - 1, Math.floor(progress / 22));
        if (newIdx !== msgIdx) { msgIdx = newIdx; status.textContent = messages[msgIdx]; }
      }, 180);
      window.__splashDone = function() {
        clearInterval(tick);
        bar.style.width = '100%';
        status.textContent = messages[messages.length - 1];
        setTimeout(() => {
          document.getElementById('splash').classList.add('hide');
          setTimeout(() => document.getElementById('splash').remove(), 550);
        }, 300);
      };
    })();
  </script>

  <script src="./app.js"></script>
</body>
</html>
