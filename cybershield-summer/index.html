<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>ZERO_DAY: Школьный Протокол</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23007AFF'/%3E%3Cpath d='M17 22h30v6L30 46h-8l16-18H17z' fill='white'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<base target="_blank">
</head>
<body>
<div class="ios-root">
  <main class="ios-app-window" id="phone" role="application" aria-label="ZERO_DAY: Школьный Протокол">
    <header class="status-bar" id="statusBar" aria-label="Статус бар">
      <div class="sb-left">
        <span class="sb-time" id="sbTime">00:00</span>
      </div>
      <div class="sb-right">
        <div class="sb-signal" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <div class="sb-wifi" aria-hidden="true">
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.5 9.6c.6 0 1.1.5 1.1 1.1s-.5 1.1-1.1 1.1-1.1-.5-1.1-1.1.5-1.1 1.1-1.1zM7.5 6.1c1.9 0 3.5.7 4.8 2L11 9.4c-.9-.9-2.1-1.4-3.5-1.4S4.9 8.5 4 9.4L2.7 8.1c1.3-1.3 3-2 4.8-2zM7.5 2.1c2.8 0 5.3 1.1 7.2 3L13.4 6.4c-1.6-1.6-3.7-2.5-5.9-2.5S3.2 4.8 1.6 6.4L.3 5.1c1.9-1.9 4.4-3 7.2-3z" fill="currentColor"/>
          </svg>
        </div>
        <div class="sb-battery" id="sbBattery" aria-hidden="true">
          <div class="sb-batt-fill" id="sbBattFill"></div>
          <div class="sb-batt-cap"></div>
        </div>
      </div>
    </header>

    <section class="app-frame" id="appFrame"></section>

    <nav class="bottom-nav" id="bottomNav" aria-label="Основная навигация"></nav>

    <div class="ios-home-dock" aria-hidden="true">
      <button
        class="ios-home-btn"
        id="iosHomeBtn"
        type="button"
        aria-label="На главный экран"
        title="На главный экран"
      >
        <span class="ios-home-glyph"></span>
      </button>
    </div>
  </main>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
