<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ec5ff"/>
      <stop offset="1" stop-color="#bde0ff"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f4f8"/>
      <stop offset="1" stop-color="#d4d8df"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values=".15"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 .06"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="720" height="720" fill="url(#sky)"/>
  <rect y="470" width="720" height="250" fill="#8ebf91"/>
  <rect x="80" y="170" width="560" height="330" rx="18" fill="url(#wall)"/>
  <rect x="130" y="220" width="150" height="110" rx="12" fill="#96c9ff"/>
  <rect x="315" y="220" width="150" height="110" rx="12" fill="#96c9ff"/>
  <rect x="500" y="220" width="90" height="200" rx="10" fill="#b7bfcc"/>
  <rect x="332" y="335" width="84" height="165" rx="8" fill="#a9b2bf"/>
  <ellipse cx="355" cy="500" rx="50" ry="16" fill="#6f8f74" opacity=".4"/>
  <circle cx="355" cy="408" r="34" fill="#f6cead"/>
  <rect x="322" y="440" width="66" height="96" rx="22" fill="#2f3f57"/>
  <rect x="310" y="460" width="22" height="76" rx="10" fill="#2f3f57"/>
  <rect x="378" y="460" width="22" height="76" rx="10" fill="#2f3f57"/>
  <rect x="325" y="540" width="24" height="90" rx="12" fill="#213149"/>
  <rect x="361" y="540" width="24" height="90" rx="12" fill="#213149"/>
  <circle cx="337" cy="410" r="4" fill="#71584a"/>
  <circle cx="373" cy="410" r="4" fill="#71584a"/>
  <rect x="335" y="426" width="36" height="8" rx="4" fill="#d09f85"/>
  <rect width="720" height="720" filter="url(#grain)"/>
</svg>
