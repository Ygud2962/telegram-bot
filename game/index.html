<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ШИФРОВАЛЬЩИК · 1941-1945</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0a0a08;
            --bg-soft: #141108;
            --accent: #ffe033;
            --accent2: #ff3a3a;
            --muted: #888;
            --green: #55dd55;
            --head: 'Courier New', monospace;
            --mono: 'Courier New', monospace;
            --fs-xs: 10px;
            --fs-sm: 12px;
            --fs-base: 14px;
            --fs-lg: 16px;
            --fs-xl: 20px;
            --fs-2xl: 28px;
            --fs-hero: 42px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: #fdfaf0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
            overflow-y: auto;
        }
        .screen.active { display: block; }
        .btn {
            background: rgba(255,224,51,.1);
            border: 1px solid rgba(255,224,51,.3);
            color: var(--accent);
            padding: 12px 24px;
            font-family: var(--head);
            font-size: var(--fs-sm);
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
        }
        .btn-accent { background: var(--accent); color: #0a0a08; }
        #s-intro {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100vh;
        }
        #intro-stamp { font-size: 72px; margin-bottom: 16px; }
        #intro-title { font-family: var(--head); font-size: 42px; color: var(--accent); margin-bottom: 16px; }
        #intro-desc { font-size: 14px; color: #ccc; max-width: 320px; margin-bottom: 24px; }
        .cipher-input {
            width: 100%;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            color: #fdfaf0;
            text-align: center;
            margin: 12px 0;
        }
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-soft);
            border-top: 1px solid rgba(255,255,255,.08);
            display: none;
            justify-content: space-around;
            padding: 8px 0;
        }
        .bn-tab {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-size: 10px;
            color: var(--muted);
            cursor: pointer;
        }
        .bn-tab.active { color: var(--accent); }
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: #0a0a08;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .chapter-card {
            background: var(--bg-soft);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chapter-card.completed { border-color: var(--green); }
        .cipher-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .cipher-progress { display: flex; gap: 6px; justify-content: center; margin: 16px 0; }
        .cipher-prog-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.15); }
        .cipher-prog-dot.done { background: var(--green); }
        .cipher-prog-dot.active { background: var(--accent); }
        #cipher-box {
            background: rgba(255,224,51,.05);
            border: 1px solid rgba(255,224,51,.2);
            border-radius: 6px;
            padding: 20px;
            font-family: var(--mono);
            font-size: 28px;
            text-align: center;
            margin-bottom: 16px;
        }
        .cipher-actions { display: flex; gap: 8px; margin-top: 12px; }
        .cipher-actions .btn { flex: 1; }
        #cipher-attempts-label { font-size: 12px; text-align: center; margin: 12px 0; }
        #cipher-timer { font-family: var(--head); font-size: 20px; color: var(--muted); text-align: center; }
        #three-canvas, #fireworks-canvas, #petals-canvas, #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        #three-canvas { z-index: 1; }
        .content-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; }
        .quiz-container { width: 100%; margin-bottom: 12px; }
        .quiz-option {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: rgba(255,255,255,.04);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 10px;
            color: #fdfaf0;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .quiz-letter {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,224,51,.08);
            border: 1.5px solid rgba(255,224,51,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--head);
            font-size: 13px;
            color: var(--accent);
        }
        .anagram-answer { display: flex; justify-content: center; gap: 6px; margin: 16px 0; }
        .anagram-slot {
            width: 40px;
            height: 50px;
            border: 2px solid rgba(255,224,51,.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: var(--fs-xl);
            color: var(--accent);
            cursor: pointer;
            background: rgba(255,224,51,.05);
        }
        .anagram-slot.filled { background: rgba(255,224,51,.15); border-color: var(--accent); }
        .anagram-pool { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin: 16px 0; }
        .anagram-letter {
            width: 40px;
            height: 50px;
            border: 2px solid rgba(255,255,255,.15);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: var(--fs-xl);
            color: #fdfaf0;
            cursor: pointer;
            background: rgba(255,255,255,.05);
        }
        .anagram-letter.used { opacity: .3; pointer-events: none; }
        .map-container { width: 100%; max-width: 340px; margin: 0 auto; }
        .map-container svg { width: 100%; height: auto; }
        .map-city-dot { cursor: pointer; }
        .map-city-dot circle { transition: all .2s; }
        .map-city-label { font-size: 10px; fill: var(--muted); pointer-events: none; }
        .map-hint-text { text-align: center; font-size: var(--fs-sm); color: var(--muted); margin-top: 12px; }
        .cipher-ref {
            background: rgba(0,0,0,.3);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 6px;
            padding: 12px;
            margin-top: 16px;
            font-size: var(--fs-sm);
            color: var(--muted);
            max-height: 200px;
            overflow-y: auto;
        }
        .cipher-ref-title { font-size: 9px; color: var(--accent); letter-spacing: .15em; margin-bottom: 8px; font-family: var(--head); }
        .morse-ref {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            font-size: var(--fs-sm);
        }
        .morse-ref div {
            background: rgba(255,224,51,.05);
            padding: 4px;
            border-radius: 3px;
            text-align: center;
        }
        .cipher-hint-box {
            background: rgba(255,224,51,.08);
            border: 1px solid rgba(255,224,51,.2);
            border-radius: 6px;
            padding: 12px;
            margin-top: 12px;
            font-size: var(--fs-sm);
            color: var(--accent);
            display: none;
        }
        .cipher-hint-box.show { display: block; }
        .succ-answer { font-family: var(--mono); font-size: var(--fs-2xl); color: var(--accent); letter-spacing: .15em; margin: 20px 0; text-align: center; }
        .succ-pts { font-family: var(--head); font-size: var(--fs-hero); color: var(--green); text-align: center; }
        .succ-time { font-size: var(--fs-sm); color: var(--muted); text-align: center; margin-top: 8px; }
        .succ-fact { background: rgba(255,255,255,.03); border-left: 3px solid var(--accent); padding: 12px; margin: 20px 0; font-size: var(--fs-sm); color: #ccc; line-height: 1.6; }
        .chend-medal { font-size: 72px; text-align: center; margin: 20px 0; }
        .chend-score { font-family: var(--head); font-size: var(--fs-2xl); color: var(--accent); text-align: center; }
        .final-score { font-family: var(--head); font-size: var(--fs-hero); color: var(--accent); text-align: center; margin: 20px 0; }
        .final-rank { font-size: var(--fs-xl); color: var(--green); text-align: center; margin-bottom: 24px; }
        .final-stars { font-size: 48px; text-align: center; opacity: 0; transition: opacity .5s; }
        .final-stars.show { opacity: 1; }
        .lb-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,.04);
        }
        .lb-rank { font-size: 20px; min-width: 30px; text-align: center; }
        .lb-rank.gold { color: #ffd700; }
        .lb-rank.silver { color: #c0c0c0; }
        .lb-rank.bronze { color: #cd7f32; }
        .lb-name { font-family: var(--head); font-size: var(--fs-base); color: #fdfaf0; }
        .lb-score { font-family: var(--head); font-size: var(--fs-xl); color: var(--accent); }
        .nav-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .nav-buttons .btn { flex: 1; }
        #game-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,17,8,.95);
            border: 1px solid rgba(255,224,51,.3);
            color: #ffe033;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: var(--head);
            font-size: 12px;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity .3s;
        }
        #ach-toast {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9997;
            background: linear-gradient(135deg,#1a1508,#2a2010);
            border: 1px solid rgba(255,224,51,.4);
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 20px rgba(255,224,51,.15);
            animation: slideInRight .4s cubic-bezier(.34,1.56,.64,1) both;
            max-width: 280px;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes popIn { 0% { transform: scale(.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .pause-info { text-align: center; padding: 40px 20px; }
        .pause-icon { font-size: 64px; margin-bottom: 16px; }
        .confetti-piece {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 9999;
            animation: confetti-fall 2s linear forwards;
        }
        @keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    <canvas id="fireworks-canvas"></canvas>
    <canvas id="petals-canvas"></canvas>
    <canvas id="particles-canvas"></canvas>
    
    <div id="splash-screen">
        <div style="font-size:72px;margin-bottom:16px;animation:popIn .6s ease both;">🔐</div>
        <div style="font-family:var(--head);font-size:var(--fs-hero);color:var(--accent);letter-spacing:.06em;text-align:center;line-height:.9;">ШИФРО<br>ВАЛЬЩИК</div>
        <div style="margin-top:24px;width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;">
            <div id="splash-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .05s linear;box-shadow:0 0 8px var(--accent);"></div>
        </div>
        <div style="margin-top:10px;font-size:var(--fs-xs);color:var(--muted);letter-spacing:.1em;">ЗАГРУЗКА...</div>
    </div>

    <div class="content-wrapper">
        <div id="s-intro" class="screen active">
            <div id="intro-stamp">🔐</div>
            <div id="intro-title">ШИФРОВАЛЬЩИК</div>
            <div id="intro-desc">Вы — советский разведчик. Расшифруйте донесения партизан и приблизьте Победу.</div>
            <button class="btn btn-accent" onclick="showScreen('s-chapters'); renderChapters();" style="width:200px;">▶ НАЧАТЬ МИССИЮ</button>
        </div>
        
        <div id="s-chapters" class="screen">
            <div style="font-family:var(--head);font-size:var(--fs-xl);color:var(--accent);margin-bottom:16px;">🗺 ЗАДАНИЯ</div>
            <div style="background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden;margin-bottom:12px;">
                <div id="ch-progress-bar" style="height:100%;background:var(--accent);border-radius:4px;width:0%;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--muted);margin-bottom:16px;">
                <span id="stat-completed-label">0 / 6 глав</span>
                <span id="stat-score">0 оч</span>
            </div>
            <div id="chapters-list"></div>
            <div class="nav-buttons">
                <button class="btn" onclick="switchTab('profile')">👤 ПРОФИЛЬ</button>
                <button class="btn" onclick="switchTab('about')">ℹ️ О ИГРЕ</button>
            </div>
        </div>
        
        <div id="s-briefing" class="screen">
            <div style="text-align:center;margin-bottom:20px;">
                <div id="brief-stamp" style="font-size:48px;margin-bottom:8px;"></div>
                <div id="brief-num" style="font-size:var(--fs-xs);color:var(--muted);margin-bottom:4px;"></div>
                <div id="brief-title" style="font-family:var(--head);font-size:var(--fs-2xl);color:var(--accent);"></div>
                <div id="brief-place" style="font-size:var(--fs-sm);color:var(--muted);"></div>
            </div>
            <div id="brief-meta" style="background:rgba(255,224,51,.05);border:1px solid rgba(255,224,51,.15);border-radius:6px;padding:12px;font-size:var(--fs-xs);color:var(--accent);line-height:1.8;margin-bottom:20px;"></div>
            <div id="brief-text" style="font-size:var(--fs-base);color:#ccc;line-height:1.7;margin-bottom:20px;"></div>
            <div id="brief-mission" style="background:rgba(85,221,85,.08);border-left:3px solid var(--green);padding:12px;font-size:var(--fs-sm);color:var(--green);margin-bottom:24px;"></div>
            <button class="btn btn-accent" onclick="startChapter(currentChapter)">▶ ПРИСТУПИТЬ</button>
            <div class="nav-buttons">
                <button class="btn" onclick="showScreen('s-chapters');renderChapters();">← НАЗАД</button>
                <button class="btn" onclick="switchTab('chapters')">🏠 ГЛАВНАЯ</button>
            </div>
        </div>
        
        <div id="s-cipher" class="screen">
            <div class="cipher-header">
                <div id="cipher-chapter-label" style="font-size:var(--fs-xs);color:var(--muted);"></div>
                <div id="cipher-score-display" style="font-family:var(--head);font-size:var(--fs-sm);color:var(--accent);">0 оч</div>
            </div>
            <div id="cipher-progress" class="cipher-progress"></div>
            <div id="cipher-type-label" style="font-size:var(--fs-xs);color:var(--accent);margin-bottom:8px;"></div>
            <div id="cipher-task" style="font-size:var(--fs-base);color:#fdfaf0;margin-bottom:16px;"></div>
            <div id="cipher-box"></div>
            <div id="quiz-container" class="quiz-container" style="display:none;"></div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
                <input type="text" id="cipher-input" class="cipher-input" placeholder="ВВЕДИТЕ ОТВЕТ" style="flex:1;">
                <button id="btn-keyboard" class="btn" style="width:48px;" onclick="toggleKeyboard()">⌨️</button>
            </div>
            <div id="cipher-attempts-label"></div>
            <div id="cipher-timer">0с</div>
            <div class="cipher-actions">
                <button id="btn-hint" class="btn" onclick="showHint()">💡 ПОДСКАЗКА</button>
                <button id="btn-check" class="btn btn-accent" onclick="checkAnswer()">✓ ПРОВЕРИТЬ</button>
            </div>
            <div id="cipher-hint-box" class="cipher-hint-box">
                <div id="cipher-hint-text"></div>
            </div>
            <div id="cipher-ref" class="cipher-ref"></div>
            <div class="nav-buttons">
                <button class="btn" onclick="pauseGame()">⏸ ПАУЗА</button>
                <button class="btn" onclick="goToChapters()">📖 ГЛАВЫ</button>
            </div>
        </div>
        
        <div id="s-success" class="screen">
            <div style="text-align:center;margin:40px 0;">
                <div style="font-size:64px;margin-bottom:16px;">✅</div>
                <div id="succ-cipher-name" style="font-size:var(--fs-xs);color:var(--muted);"></div>
                <div id="succ-answer" class="succ-answer"></div>
                <div id="succ-pts" class="succ-pts"></div>
                <div id="succ-time" class="succ-time"></div>
                <div id="succ-speed" style="font-size:var(--fs-sm);color:var(--muted);margin-top:8px;"></div>
            </div>
            <div id="succ-fact" class="succ-fact"></div>
            <button id="succ-next-btn" class="btn btn-accent" onclick="nextCipher()"></button>
            <div class="nav-buttons">
                <button class="btn" onclick="goToChapters()">📖 ГЛАВЫ</button>
                <button class="btn" onclick="switchTab('chapters')">🏠 ГЛАВНАЯ</button>
            </div>
        </div>
        
        <div id="s-chapter-end" class="screen">
            <div style="text-align:center;margin:40px 0;">
                <div id="chend-medal" class="chend-medal"></div>
                <div id="chend-chapter-name" style="font-family:var(--head);font-size:var(--fs-xl);color:var(--accent);margin-bottom:8px;"></div>
                <div id="chend-score" class="chend-score"></div>
                <div id="chend-total" style="font-size:var(--fs-sm);color:var(--muted);"></div>
                <div id="chend-pct" style="font-size:var(--fs-sm);color:var(--muted);"></div>
            </div>
            <button id="chend-next-btn" class="btn btn-accent"></button>
            <div class="nav-buttons">
                <button class="btn" onclick="showScreen('s-chapters');renderChapters();">📖 ГЛАВЫ</button>
                <button class="btn" onclick="switchTab('chapters')">🏠 ГЛАВНАЯ</button>
            </div>
        </div>
        
        <div id="s-chapter-fail" class="screen">
            <div style="text-align:center;margin:40px 0;">
                <div style="font-size:64px;margin-bottom:16px;">💔</div>
                <div id="fail-chapter-name" style="font-family:var(--head);font-size:var(--fs-xl);color:var(--accent2);margin-bottom:8px;"></div>
                <div id="fail-score-line" style="font-size:var(--fs-sm);color:var(--muted);margin-bottom:24px;"></div>
            </div>
            <button id="fail-retry-btn" class="btn" style="display:none;"></button>
            <div id="fail-retry-info" style="background:rgba(255,58,58,.08);border:1px solid rgba(255,58,58,.2);border-radius:6px;padding:12px;font-size:var(--fs-xs);color:var(--accent2);margin:12px 0;display:none;"></div>
            <button id="fail-next-btn" class="btn" style="display:none;"></button>
            <div class="nav-buttons">
                <button class="btn" onclick="showScreen('s-chapters');renderChapters();">← К ЗАДАНИЯМ</button>
                <button class="btn" onclick="switchTab('chapters')">🏠 ГЛАВНАЯ</button>
            </div>
        </div>
        
        <div id="s-pause" class="screen">
            <div class="pause-info">
                <div class="pause-icon">⏸</div>
                <div style="font-family:var(--head);font-size:var(--fs-xl);color:var(--accent);margin-bottom:8px;">ПАУЗА</div>
                <div id="pause-chapter-info" style="font-size:var(--fs-sm);color:var(--muted);margin-bottom:32px;"></div>
                <button class="btn btn-accent" onclick="resumeGame()">▶ ПРОДОЛЖИТЬ</button>
                <div class="nav-buttons">
                    <button class="btn" onclick="goToChapters()">📖 К ГЛАВАМ</button>
                    <button class="btn" onclick="exitToMain()">🏠 В ГЛАВНОЕ МЕНЮ</button>
                </div>
            </div>
        </div>
        
        <div id="s-final" class="screen">
            <div style="text-align:center;margin:40px 0;">
                <div id="final-stars" class="final-stars">★★★★★</div>
                <div style="font-size:var(--fs-xs);color:var(--muted);margin:20px 0;">МИССИЯ ВЫПОЛНЕНА</div>
                <div id="final-score-val" class="final-score"></div>
                <div id="final-rank" class="final-rank"></div>
                <div id="final-pct" style="font-size:var(--fs-sm);color:var(--muted);margin-bottom:24px;"></div>
                <div id="final-uid" style="font-size:var(--fs-xs);color:var(--muted);font-family:var(--mono);margin-bottom:16px;display:none;"></div>

function storageKey() {

return uid ? `cipher_v4_${uid}` : 'cipher_v4_guest';
}

function loadState() {
try {
const s = localStorage.getItem(storageKey());
if (s) Object.assign(state, JSON.parse(s));
} catch(e) {}
}

function saveState() {
try {
localStorage.setItem(storageKey(), JSON.stringify(state));
} catch(e) {}
}

function mergeBotLeaderboard() {
const myUid = getTgUserId();
if (tgInitLB.length) {
state.leaderboard = tgInitLB.map(r => ({
uid: String(r.uid), name: r.name, score: r.score,
completed: r.completed, role: r.role || 'player'
}));
}
if (tgInitMe && myUid) {
const dbScore = tgInitMe.score || 0;
const dbCompleted = tgInitMe.completed || 0;
const dbGameOver = tgInitMe.game_over || false;
const dbAdminMode = (tgInitMe && tgInitMe.admin_mode === true) || window._adminMode === true;
if (dbAdminMode) {
state.adminMode = true;
console.log('👑 adminMode=true установлен от бота');
}
state.totalScore = dbScore;
state.completedChapters = {};
for (let i = 1; i <= dbCompleted; i++) {
state.completedChapters[i] = true;
}
const newScores = {};
for (let i = 1; i <= dbCompleted; i++) {
if (state.chapterScores[i]) newScores[i] = state.chapterScores[i];
}
state.chapterScores = newScores;
state.gameOver = dbGameOver;
try { localStorage.removeItem(storageKey()); } catch(e2) {}
saveState();
}
}

function showScreen(id) {
const TAB_SCREENS = ['s-leaderboard-tab','s-profile-tab','s-about-tab'];
if (TAB_SCREENS.includes(id)) return;
if (id === 's-chapters') {
switchTab('chapters');
return;
}
hideBottomNav();
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
const el = document.getElementById(id);
if (el) el.classList.add('active');
}

function showBottomNav() {
const nav = document.getElementById('bottom-nav');
if (nav) nav.style.display = 'flex';
}

function hideBottomNav() {
const nav = document.getElementById('bottom-nav');
if (nav) nav.style.display = 'none';
}

let currentTab = 'chapters';
function switchTab(tab) {
currentTab = tab;
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.querySelectorAll('.bn-tab').forEach(b => b.classList.remove('active'));
showBottomNav();
const screenMap = {
'chapters': 's-chapters',
'leaderboard': 's-leaderboard-tab',
'profile': 's-profile-tab',
'about': 's-about-tab',
};
const tabMap = {
'chapters': 'bn-chapters',
'leaderboard': 'bn-leaderboard',
'profile': 'bn-profile',
'about': 'bn-about',
};
const screenEl = document.getElementById(screenMap[tab]);
const tabEl = document.getElementById(tabMap[tab]);
if (screenEl) screenEl.classList.add('active');
if (tabEl) tabEl.classList.add('active');
if (tab === 'chapters') { renderChapters(); }
if (tab === 'leaderboard') renderLeaderboardTab();
if (tab === 'profile') renderProfileTab();
if (tab === 'about') renderAboutTab();
}

function toggleKeyboard() {

const btn = document.getElementById('btn-keyboard');

if (inp.readOnly) {
inp.removeAttribute('readonly');
inp.focus();
if (btn) { btn.style.background = 'rgba(255,224,51,.25)'; btn.style.borderColor = 'rgba(255,224,51,.5)'; }

}
}

card.innerHTML = `
<div style="font-size:32px;">${ch.stamp || '🔐'}</div>
<div style="flex:1;">

</div>
<div style="text-align:right;">
<div style="font-size:20px;">${isDone ? '✅' : '▶'}</div>
${scoreVal ? `<div style="font-family:var(--head);font-size:12px;color:var(--accent);">${scoreVal}</div>` : ''}
</div>`;
if (!isDone) {
card.onclick = () => { showBriefing(i); };
card.style.cursor = 'pointer';
}
list.appendChild(card);
});
const total = CHAPTERS.length;
const pct = Math.round((completedCount / total) * 100);
const pbEl = document.getElementById('ch-progress-bar');
if (pbEl) pbEl.style.width = pct + '%';
const clEl = document.getElementById('stat-completed-label');
if (clEl) clEl.textContent = completedCount + ' / ' + total + ' глав';
const scEl = document.getElementById('stat-score');
if (scEl) scEl.textContent = state.totalScore;
}

// ═══════════════════════════════════════════════════════
//  BRIEFING
// ═══════════════════════════════════════════════════════
function showBriefing(idx) {
if (idx < 0 || idx >= CHAPTERS.length) { showScreen('s-chapters'); renderChapters(); return; }
currentChapter = idx;
const ch = CHAPTERS[idx];
document.getElementById('brief-num').textContent = ch.subtitle + ' — ' + ch.place;
document.getElementById('brief-title').textContent = ch.title;
document.getElementById('brief-place').textContent = ch.place;
document.getElementById('brief-stamp').textContent = ch.stamp;
document.getElementById('brief-meta').innerHTML = ch.meta ? ch.meta.replace(/\n/g,'<br>') : '';
document.getElementById('brief-text').textContent = ch.briefing || '';
document.getElementById('brief-mission').textContent = ch.mission || '';
showScreen('s-briefing');
}

// ═══════════════════════════════════════════════════════
//  START CHAPTER
// ═══════════════════════════════════════════════════════
function startChapter(idx) {
state.chapter = idx;
state.cipherIdx = 0;
state.lives = 5;
state.chapterScore = 0;
state.streak = 0;
state._chapterStartTime = Date.now();
state._chapterErrors = 0;
state._chapterHints = 0;
saveState();
loadCipher();
showScreen('s-cipher');
}

// ═══════════════════════════════════════════════════════
//  LOAD CIPHER
// ═══════════════════════════════════════════════════════
function loadCipher() {
const ch = CHAPTERS[state.chapter];
if (!ch) { showScreen('s-chapters'); renderChapters(); return; }
const cipher = ch.ciphers[state.cipherIdx];
if (!cipher) { finishChapter(); return; }

const qc = document.getElementById('quiz-container');
if (qc) qc.style.display = 'none';

const inp = document.getElementById('cipher-input');
const inpWrap = document.getElementById('cipher-input-wrap');
const checkBtn = document.getElementById('btn-check');
const hintBtn = document.getElementById('btn-hint');
const boxEl = document.getElementById('cipher-box');

if (cipher.type !== 'quiz') {
if (inp) { inp.style.display = ''; inp.value = ''; inp.disabled = false; inp.className = 'cipher-input'; }
if (inpWrap) inpWrap.style.display = '';
if (checkBtn) checkBtn.style.display = '';
if (hintBtn) { hintBtn.style.display = ''; hintBtn.disabled = false; hintBtn.textContent = '💡 ПОДСКАЗКА'; }
if (boxEl) boxEl.style.display = '';
} else {
if (inp) inp.style.display = 'none';
if (inpWrap) inpWrap.style.display = 'none';
if (checkBtn) checkBtn.style.display = 'none';
if (boxEl) boxEl.style.display = 'none';
}

state.startTime = Date.now();
const prog = document.getElementById('cipher-progress');
prog.innerHTML = ch.ciphers.map((c, i) =>
`<div class="cipher-prog-dot ${i < state.cipherIdx ? 'done' : i === state.cipherIdx ? 'active' : ''}"></div>`
).join('');

document.getElementById('cipher-chapter-label').textContent = ch.subtitle + ' · ' + ch.place;
const scoreEl = document.getElementById('cipher-score-display');
if (scoreEl) scoreEl.textContent = state.chapterScore + ' оч';
document.getElementById('cipher-type-label').textContent = cipher.typeLabel;
document.getElementById('cipher-task').textContent = cipher.task;

const box = document.getElementById('cipher-box');
if (box) {
box.setAttribute('data-num', String(state.cipherIdx + 1).padStart(3,'0'));
if (cipher.type === 'quiz') {
box.style.display = 'none';
} else if (cipher.type === 'anagram') {
box.textContent = '';
box.style.display = 'none';
} else if (cipher.type === 'math') {
box.innerHTML = `<div class="math-formula">${cipher.encrypted}</div>`;
} else if (cipher.type === 'map') {
box.innerHTML = '';
renderMap(cipher);
} else {
box.textContent = cipher.encrypted || '';
}
}

const inputWrap = document.querySelector('.cipher-input-wrap');
const actions = document.querySelector('.cipher-actions');
const btnCheck = document.querySelector('.btn-check');
if (cipher.type === 'map' || cipher.type === 'anagram') {
if (inputWrap) inputWrap.style.display = 'none';
if (btnCheck) btnCheck.style.display = 'none';
} else {
if (inputWrap) inputWrap.style.display = '';
if (btnCheck) btnCheck.style.display = '';
}

renderLives();
startTimer();

const inpReset = document.getElementById('cipher-input');
if (inpReset) { inpReset.value = ''; inpReset.className = 'cipher-input'; inpReset.disabled = false; inpReset.setAttribute('readonly', true); }
const kbBtn = document.getElementById('btn-keyboard');
if (kbBtn) { kbBtn.style.background = 'rgba(255,224,51,.1)'; kbBtn.style.borderColor = 'rgba(255,224,51,.2)'; }

state.hintsUsed = false;
const hb = document.getElementById('cipher-hint-box');
const ht = document.getElementById('cipher-hint-text');
const bh = document.getElementById('btn-hint');
if (hb) hb.className = 'cipher-hint-box';
if (ht) ht.textContent = '';
if (bh) { bh.disabled = false; bh.textContent = '💡 ПОДСКАЗКА'; }

renderRef(cipher.type, cipher.shift);
if (cipher.type === 'anagram') renderAnagram(cipher);
if (cipher.type === 'map') renderMap(cipher);
if (cipher.type === 'quiz') renderQuiz(cipher);
if (cipher.type !== 'map' && cipher.type !== 'anagram' && inp) inp.focus();
}

function renderLives() {
const el = document.getElementById('cipher-attempts-label');
if (!el) return;
if (state.adminMode) {
el.innerHTML = '♾️ АДМИН';
return;
}
const n = state.lives;
let hearts = '';
for(let i=0;i<n;i++) hearts += '❤️';
for(let i=n;i<5;i++) hearts += '🖤';
el.innerHTML = hearts;
}

function startTimer() {
if (_timerInterval) clearInterval(_timerInterval);
const el = document.getElementById('cipher-timer');
if (!el) return;
const start = Date.now();
el.textContent = '0с';
el.style.color = 'var(--muted)';
_timerInterval = setInterval(() => {
const sec = Math.round((Date.now() - start) / 1000);
el.textContent = sec + 'с';
if (sec <= 10) el.style.color = 'var(--green)';
else if (sec <= 30) el.style.color = 'var(--accent)';
else if (sec <= 60) el.style.color = 'var(--accent2)';
else el.style.color = 'var(--red)';
}, 1000);
}

function stopTimer() {
if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
const el = document.getElementById('cipher-timer');
if (el) el.style.color = 'var(--muted)';
}

function renderRef(type, shift) {
const ref = document.getElementById('cipher-ref');
if (!ref) return;
if (!['caesar', 'atbash', 'morse', 'num'].includes(type)) {
ref.innerHTML = '';
return;
}
if (type === 'morse') {
ref.innerHTML = `<div class="cipher-ref-title">// ТАБЛИЦА МОРЗЕ</div><div style="font-size:var(--fs-base);color:var(--accent);font-weight:700;margin-bottom:8px;letter-spacing:.05em">/ — разделение букв &nbsp;&nbsp; // — пробел (новое слово)</div><div class="morse-ref">${Object.entries(MORSE_TABLE).map(([l,c])=>`<div><span style="color:var(--accent)">${l}</span><span style="color:var(--muted)">${c}</span></div>`).join('')}</div>`;
} else if (type === 'atbash') {
const a = RU_ALPHA;
ref.innerHTML = `<div class="cipher-ref-title">// ТАБЛИЦА АТБАШ (зеркальный алфавит)</div><div class="caesar-ref">${a.split('').map((l,i)=>`<div style="display:inline-block;width:50px;text-align:center;margin:2px"><span style="color:var(--accent)">${a[a.length-1-i]}</span><span style="color:var(--muted)">→${l}</span></div>`).join(' ')}</div>`;
} else if (type === 'num') {
const a = RU_ALPHA;
ref.innerHTML = `<div class="cipher-ref-title">// ЧИСЛОВОЙ КОД (буква = номер в алфавите)</div><div class="caesar-ref">${a.split('').map((l,i)=>`<div style="display:inline-block;width:50px;text-align:center;margin:2px"><span style="color:var(--accent)">${i+1}</span><span style="color:var(--muted)">=${l}</span></div>`).join(' ')}</div>`;
} else if (type === 'anagram' || type === 'map') {
ref.innerHTML = '';
} else if (type === 'math') {
ref.innerHTML = `<div class="cipher-ref-title">// ПОДСКАЗКА</div><div style="font-size:var(--fs-sm);color:var(--muted);padding:8px 0;line-height:1.7">Введи ответ цифрой в поле ниже.</div>`;
} else {
const alpha = RU_ALPHA;
ref.innerHTML = `<div class="cipher-ref-title">// АЛФАВИТ ДЛЯ РАСШИФРОВКИ (сдвиг ${shift})</div><div class="caesar-ref">${alpha.split('').map((l,i)=>{ const fromIdx = (i + shift) % alpha.length; return `<div style="display:inline-block;width:50px;text-align:center;margin:2px"><span style="color:var(--accent)">${alpha[fromIdx]}</span><span style="color:var(--muted)">→${l}</span></div>`; }).join(' ')}</div>`;
}
}

// ═══════════════════════════════════════════════════════
//  CHECK ANSWER
// ═══════════════════════════════════════════════════════
async function checkAnswer() {
const cipher = CHAPTERS[state.chapter].ciphers[state.cipherIdx];
if (cipher.type === 'quiz') {
quizSubmit();
return;
}
if (cipher.type === 'map' || cipher.type === 'anagram') return;

const inp = document.getElementById('cipher-input');
const val = inp.value.trim().toUpperCase().replace(/\s+/g, ' ');
if (!val) { inp.focus(); showToast('👆 Введите ответ'); return; }

const elapsed = Math.round((Date.now() - state.startTime) / 1000);

if (val === cipher.answer) {
inp.className = 'cipher-input correct';
inp.disabled = true;
state.streak = (state.streak || 0) + 1;
playSound('correct');
const pts = cipher.points;
state.chapterScore += pts;
saveState();
stopTimer();
if (elapsed <= 5) state._fastAnswers = (state._fastAnswers || 0) + 1;
const isFirstTry = (state._chapterErrors || 0) === 0;
setTimeout(() => showSuccess(cipher, pts, elapsed), 400);
} else {
inp.className = 'cipher-input wrong';
playSound('wrong');
setTimeout(() => inp.className = 'cipher-input', 500);
state.streak = 0;
state._chapterErrors = (state._chapterErrors || 0) + 1;
if (!state.adminMode) {
state.lives--;
}
saveState();
renderLives();
if (state.lives <= 0) {
inp.disabled = true;
stopTimer();
setTimeout(() => failChapter(), 1200);
} else {
showToast('❌ Неверно! Попробуйте ещё раз');
inp.value = '';
}
}
}

function showHint() {
const cipher = CHAPTERS[state.chapter].ciphers[state.cipherIdx];
if (state.hintsUsed) return;
state.hintsUsed = true;
playSound('hint');
const hintBox = document.getElementById('cipher-hint-box');
const hintText = document.getElementById('cipher-hint-text');
if (hintBox && hintText) {
hintText.textContent = cipher.hint;
hintBox.className = 'cipher-hint-box show';
}
const btn = document.getElementById('btn-hint');
if (btn) { btn.disabled = true; btn.textContent = '✓ ПОДСКАЗКА'; }
if (cipher.type === 'map') {
const mht = document.getElementById('map-hint-text');
if (mht) mht.textContent = '💡 ' + cipher.hint;
}
if (!state.adminMode && state.lives > 1) {
state.lives--;
state._chapterHints = (state._chapterHints || 0) + 1;
saveState();
renderLives();
}
}

// ═══════════════════════════════════════════════════════
//  SUCCESS
// ═══════════════════════════════════════════════════════
function showSuccess(cipher, pts, elapsed) {
document.getElementById('succ-answer').textContent = cipher.answer;
document.getElementById('succ-cipher-name').textContent = '// ' + cipher.typeLabel;
const factEl = document.getElementById('succ-fact');
if (factEl) factEl.innerHTML = cipher.fact ? '📜 ' + cipher.fact : '';
document.getElementById('succ-pts').textContent = pts > 0 ? '+' + pts : '0';
document.getElementById('succ-time').textContent = typeof elapsed === 'number' ? elapsed + 'с' : elapsed;
const speedEl = document.getElementById('succ-speed');
const streak = state.streak || 0;
let speedText = '', speedColor = 'var(--muted)';
if (elapsed <= 10) { speedText = '⚡ Молниеносно!'; speedColor = 'var(--green)'; }
else if (elapsed <= 20) { speedText = '🔥 Быстро!'; speedColor = 'var(--accent)'; }
else if (elapsed > 60) { speedText = '🐢 Медленно...'; }
else { speedText = '⏱ ' + elapsed + 'с'; }
if (streak >= 2) {
const bonus = Math.min(30, streak * 5);
speedText += '  🔥 Стрик x' + streak + ' (+' + bonus + '%)';
speedColor = streak >= 4 ? 'var(--green)' : 'var(--accent)';
}
speedEl.textContent = speedText;
speedEl.style.color = speedColor;
const ch = CHAPTERS[state.chapter];
const isLast = state.cipherIdx === ch.ciphers.length - 1;
const btn = document.getElementById('succ-next-btn');
btn.textContent = isLast ? 'ЗАВЕРШИТЬ ГЛАВУ →' : 'СЛЕДУЮЩИЙ ШИФР →';
showScreen('s-success');
}

function nextCipher() {
const ch = CHAPTERS[state.chapter];
if (state.cipherIdx < ch.ciphers.length - 1) {
state.cipherIdx++;
saveState();
loadCipher();
showScreen('s-cipher');
} else {
finishChapter();
}
}

// ═══════════════════════════════════════════════════════
//  FINISH CHAPTER
// ═══════════════════════════════════════════════════════
async function finishChapter() {
const ch = CHAPTERS[state.chapter];
const alreadyDone = !!state.completedChapters[ch.id];
const chTime = Math.round((Date.now() - (state._chapterStartTime || Date.now())) / 1000);
if (!state.chapterStats) state.chapterStats = {};
state.chapterStats[ch.id] = {
time: chTime, errors: state._chapterErrors || 0,
hints: state._chapterHints || 0, score: state.chapterScore,
max: ch.ciphers.reduce((s,c) => s+c.points, 0)
};
state.completedChapters[ch.id] = true;
if (!alreadyDone && !state._noptsMode) {
state.chapterScores[ch.id] = state.chapterScore;
state.totalScore += state.chapterScore;
if (state.retryPenalty) state.retryPenalty = false;
} else if (state._noptsMode) {
state.chapterScores[ch.id] = 0;
}
const maxPossible = ch.ciphers.reduce((s,c)=>s+c.points, 0);
const pct = state.chapterScore / maxPossible;
let medal = '🥉';
if (pct >= 0.85) medal = '🥇';
else if (pct >= 0.60) medal = '🥈';
const allDone = CHAPTERS.every(c => state.completedChapters[c.id]);
if (allDone) state.gameOver = true;
updateLeaderboard();
saveState();
document.getElementById('chend-chapter-name').textContent = ch.title;
document.getElementById('chend-medal').textContent = medal;
document.getElementById('chend-score').textContent = state.chapterScore;
document.getElementById('chend-total').textContent = state.totalScore;
document.getElementById('chend-pct').textContent = Math.round(pct*100) + '%';
const nextBtn = document.getElementById('chend-next-btn');
if (allDone) {
nextBtn.textContent = '🏆 СМОТРЕТЬ ИТОГ';
nextBtn.onclick = () => { showFinal(); };
} else {
nextBtn.textContent = '← К ЗАДАНИЯМ';
nextBtn.onclick = () => { showScreen('s-chapters'); renderChapters(); };
}
playSound('chapter_win');
launchConfetti(800, 20);
showScreen('s-chapter-end');
}

// ═══════════════════════════════════════════════════════
//  FAIL CHAPTER
// ═══════════════════════════════════════════════════════
async function failChapter() {
const ch = CHAPTERS[state.chapter];
const alreadyDone = !!state.completedChapters[ch.id];
if (!state.chapterStats) state.chapterStats = {};
state.chapterStats[ch.id] = {
time: 0, errors: state._chapterErrors || 0,
hints: state._chapterHints || 0, score: state.chapterScore,
max: ch.ciphers.reduce((s,c2) => s+c2.points, 0), failed: true
};
if (!state.chapterFailCounts) state.chapterFailCounts = {};
const failCount = (state.chapterFailCounts[ch.id] || 0) + 1;
state.chapterFailCounts[ch.id] = failCount;
if (!alreadyDone && !state._noptsMode) {
state.chapterScores[ch.id] = state.chapterScore;
state.totalScore += state.chapterScore;
} else if (state._noptsMode) {
state.chapterScores[ch.id] = 0;
}
const allDone = CHAPTERS.every(c => state.completedChapters[c.id]);
if (allDone) state.gameOver = true;
updateLeaderboard();
saveState();
document.getElementById('fail-chapter-name').textContent = ch.title;
document.getElementById('fail-score-line').textContent = `Набрано очков в этой главе: ${state.chapterScore}`;
const nextIdx = state.chapter + 1;
const nextBtn = document.getElementById('fail-next-btn');
if (nextIdx < CHAPTERS.length && !allDone) {
const nextCh = CHAPTERS[nextIdx];
nextBtn.textContent = 'СЛЕДУЮЩАЯ ГЛАВА: ' + nextCh.title + ' →';
nextBtn.onclick = () => showBriefing(nextIdx);
nextBtn.style.display = 'block';
} else if (allDone) {
nextBtn.textContent = '🏆 СМОТРЕТЬ ИТОГ';
nextBtn.onclick = () => showFinal();
nextBtn.style.display = 'block';
} else {
nextBtn.style.display = 'none';
}
const retryBtn = document.getElementById('fail-retry-btn');
const retryInfo = document.getElementById('fail-retry-info');
const currentFailCount = state.chapterFailCounts[ch.id] || 1;
const currentPenalty = Math.min(50, currentFailCount * 5);
if (retryBtn) {
retryBtn.style.display = 'block';
retryBtn.textContent = '🔄 ПОПРОБОВАТЬ СНОВА';
retryBtn.onclick = () => { state._isRetryAttempt = true; retryChapterWithPenalty(state.chapter); };
}
if (retryInfo) {
retryInfo.style.display = 'block';
retryInfo.innerHTML = currentFailCount === 1
? `⚠️ Повтор: штраф <b>-${currentPenalty}%</b> от набранных очков<br>Жизни восстановятся`
: `⚠️ Повтор #${currentFailCount}: штраф <b>-${currentPenalty}%</b> от очков<br>Жизни восстановятся`;
}
showScreen('s-chapter-fail');
}

function retryChapterWithPenalty(idx) {
const ch = CHAPTERS[idx];
if (!state.chapterFailCounts) state.chapterFailCounts = {};
const failCount = state.chapterFailCounts[ch.id] || 1;
const penaltyPct = Math.min(0.50, failCount * 0.05);
const penalty = Math.round(state.totalScore * penaltyPct);
state.totalScore = Math.max(0, state.totalScore - penalty);
delete state.completedChapters[ch.id];
delete state.chapterScores[ch.id];
state.lives = 5;
state.chapterScore = 0;
state.streak = 0;
state._chapterErrors = 0;
state._chapterHints = 0;
saveState();
showBriefing(idx);
}

// ═══════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════
function renderQuiz(cipher) {
_quizState = { cipher, startTime: Date.now(), selected: null, answered: false };
const container = document.getElementById('quiz-container');
if (!container) return;
container.style.display = 'block';
const letters = ['А', 'Б', 'В', 'Г', 'Д'];
const optionsHtml = cipher.options.map((opt, i) => `<div id="quiz-opt-${i}" onclick="quizSelect(${i})" class="quiz-option"> <div id="quiz-letter-${i}" class="quiz-letter">${letters[i]}</div> <span>${opt}</span> </div>`).join('');
container.innerHTML = `<div id="quiz-options-list">${optionsHtml}</div><div id="quiz-feedback" style="display:none;padding:10px 14px;border-radius:8px; margin-top:4px;font-size:13px;text-align:center;"></div>`;
const checkBtn = document.getElementById('btn-check');
if (checkBtn) {
checkBtn.style.display = '';
checkBtn.textContent = '✓ ПРОВЕРИТЬ';
}
}

function quizSelect(idx) {
if (_quizState.answered) return;
_quizState.selected = idx;
_quizState.cipher.options.forEach((_, i) => {
const opt = document.getElementById('quiz-opt-' + i);
const let_ = document.getElementById('quiz-letter-' + i);
if (!opt) return;
if (i === idx) {
opt.style.background = 'rgba(255,224,51,.12)';
opt.style.borderColor = 'rgba(255,224,51,.45)';
if (let_) { let_.style.background = 'rgba(255,224,51,.25)'; let_.style.borderColor = 'rgba(255,224,51,.6)'; let_.style.color = '#ffe033'; }
} else {
opt.style.background = 'rgba(255,255,255,.04)';
opt.style.borderColor = 'rgba(255,255,255,.1)';
if (let_) { let_.style.background = 'rgba(255,224,51,.08)'; let_.style.borderColor = 'rgba(255,224,51,.2)'; let_.style.color = 'var(--accent)'; }
}
});
}

function quizSubmit() {
if (_quizState.answered || _quizState.selected === null) {
showToast('👆 Выберите вариант ответа');
return;
}
_quizState.answered = true;
const cipher = _quizState.cipher;
const correct = cipher.correctIndex;
const selected = _quizState.selected;
const elapsed = Math.round((Date.now() - _quizState.startTime) / 1000);
const isCorrect = selected === correct;
cipher.options.forEach((_, i) => {
const opt = document.getElementById('quiz-opt-' + i);
const let_ = document.getElementById('quiz-letter-' + i);
if (!opt) return;
opt.style.cursor = 'default';
if (i === correct) {
opt.style.background = 'rgba(40,200,80,.15)';
opt.style.borderColor = 'rgba(40,200,80,.5)';
opt.style.color = '#50ee80';
if (let_) { let_.style.background = 'rgba(40,200,80,.25)'; let_.style.borderColor = 'rgba(40,200,80,.6)'; let_.style.color = '#50ee80'; }
} else if (i === selected && !isCorrect) {
opt.style.background = 'rgba(255,50,50,.12)';
opt.style.borderColor = 'rgba(255,50,50,.45)';
opt.style.color = '#ff7070';
if (let_) { let_.style.background = 'rgba(255,50,50,.2)'; let_.style.borderColor = 'rgba(255,50,50,.5)'; let_.style.color = '#ff7070'; }
} else {
opt.style.opacity = '0.4';
}
});
const feedback = document.getElementById('quiz-feedback');
if (isCorrect) {
playSound('correct');
if (feedback) {
feedback.style.display = 'block';
feedback.style.background = 'rgba(40,200,80,.1)';
feedback.style.border = '1px solid rgba(40,200,80,.3)';
feedback.style.color = '#50ee80';
feedback.textContent = '✅ Верно!';
}
state.streak = (state.streak || 0) + 1;
const pts = cipher.points;
state.chapterScore += pts;
saveState();
stopTimer();
setTimeout(() => {
const qc = document.getElementById('quiz-container');
if (qc) qc.style.display = 'none';
const ciw = document.getElementById('cipher-input-wrap');
if (ciw) ciw.style.display = '';
showSuccess(cipher, pts, elapsed);
}, 900);
} else {
playSound('wrong');
if (feedback) {
feedback.style.display = 'block';
feedback.style.background = 'rgba(255,50,50,.1)';
feedback.style.border = '1px solid rgba(255,50,50,.3)';
feedback.style.color = '#ff8080';
feedback.textContent = '❌ Неверно — правильный ответ выделен зелёным';
}
state.streak = 0;
state._chapterErrors = (state._chapterErrors || 0) + 1;
if (!state.adminMode) {
state.lives--;
}
saveState();

//  ANAGRAM
// ═══════════════════════════════════════════════════════
function renderAnagram(cipher) {
const box = document.getElementById('cipher-box');
box.style.display = 'none';
const letters = cipher.encrypted.split('');
anagramState = { letters: [...letters], placed: Array(letters.length).fill(null), usedIdx: Array(letters.length).fill(false) };
const ref = document.getElementById('cipher-ref');
ref.innerHTML = `<div class="cipher-ref-title">// СОСТАВЬ СЛОВО</div><div style="font-size:var(--fs-sm);color:var(--accent);font-weight:700;margin-bottom:10px;text-align:center;">👆 Тапай на буквы ниже — составляй слово</div><div class="anagram-answer" id="ag-answer">${letters.map((_,i)=>`<div class="anagram-slot" id="ag-slot-${i}" onclick="removeFromSlot(${i})"></div>`).join('')}</div><div class="anagram-pool" id="ag-pool">${letters.map((l,i)=>`<div class="anagram-letter" id="ag-letter-${i}" onclick="addToSlot(${i})">${l}</div>`).join('')}</div><div style="text-align:center"><button class="anagram-reset" onclick="resetAnagram()">↺ Сбросить</button></div>`;
}

function addToSlot(letterIdx) {
if (anagramState.usedIdx[letterIdx]) return;
const slotIdx = anagramState.placed.indexOf(null);
if (slotIdx === -1) return;
anagramState.placed[slotIdx] = letterIdx;
anagramState.usedIdx[letterIdx] = true;
document.getElementById(`ag-letter-${letterIdx}`).classList.add('used');
const slot = document.getElementById(`ag-slot-${slotIdx}`);
slot.textContent = anagramState.letters[letterIdx];
slot.classList.add('filled');
if (!anagramState.placed.includes(null)) {
setTimeout(checkAnagram, 300);
}
}

function removeFromSlot(slotIdx) {
const letterIdx = anagramState.placed[slotIdx];
if (letterIdx === null) return;
anagramState.placed[slotIdx] = null;
anagramState.usedIdx[letterIdx] = false;
document.getElementById(`ag-letter-${letterIdx}`).classList.remove('used');
const slot = document.getElementById(`ag-slot-${slotIdx}`);
slot.textContent = '';
slot.classList.remove('filled');
}

function resetAnagram() {
const cipher = CHAPTERS[state.chapter].ciphers[state.cipherIdx];
renderAnagram(cipher);
}

async function checkAnagram() {
const cipher = CHAPTERS[state.chapter].ciphers[state.cipherIdx];
const answer = anagramState.placed.map(i => i !== null ? anagramState.letters[i] : '').join('');
const elapsed = Math.round((Date.now() - state.startTime) / 1000);
const slots = document.querySelectorAll('.anagram-slot');
if (answer.toUpperCase() === cipher.answer) {
slots.forEach(s => { s.style.borderColor = '#55dd55'; s.style.background = 'rgba(85,221,85,.15)'; });
const pts = cipher.points;
state.chapterScore += pts;
saveState();
setTimeout(() => showSuccess(cipher, pts, elapsed), 600);
} else {
slots.forEach(s => { s.style.borderColor = '#ff3a3a'; s.style.background = 'rgba(255,58,58,.1)'; });
setTimeout(() => slots.forEach(s => { s.style.borderColor = ''; s.style.background = ''; }), 800);
state.lives--;
saveState();
if (state.lives <= 0) {
if (state.adminMode) {
state.lives = 5; saveState(); renderLives();
setTimeout(resetAnagram, 500);
} else {
setTimeout(() => failChapter(), 1200);
}
} else {
renderLives();
setTimeout(resetAnagram, 900);
}
showToast('❌ Неверно! Попробуйте ещё раз');
}
}

//  SOUNDS
// ═══════════════════════════════════════════════════════
function getAudio() {
if (!_audioCtx) {
try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
return _audioCtx;
}

function playSound(type) {
const ctx = getAudio();
if (!ctx) return;
try {
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
const now = ctx.currentTime;
if (type === 'correct') {
osc.type = 'sine';
osc.frequency.setValueAtTime(523, now);
osc.frequency.setValueAtTime(784, now + 0.1);
gain.gain.setValueAtTime(0.3, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
osc.start(now); osc.stop(now + 0.4);
} else if (type === 'wrong') {
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(150, now);
osc.frequency.setValueAtTime(100, now + 0.15);
gain.gain.setValueAtTime(0.2, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
osc.start(now); osc.stop(now + 0.3);
} else if (type === 'chapter_win') {
const freqs = [523, 659, 784, 1047];
freqs.forEach((f, i) => {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.type = 'sine';
o.frequency.setValueAtTime(f, now + i * 0.1);
g.gain.setValueAtTime(0.25, now + i * 0.1);
g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.3);
});
} else if (type === 'life_lost') {
osc.type = 'square';
osc.frequency.setValueAtTime(200, now);
osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
osc.start(now); osc.stop(now + 0.3);
} else if (type === 'hint') {
osc.type = 'sine';
osc.frequency.setValueAtTime(440, now);
gain.gain.setValueAtTime(0.15, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
osc.start(now); osc.stop(now + 0.2);
} else if (type === 'game_win') {
[523,659,784,880,1047].forEach((f, i) => {
const o = ctx.createOscillator();
const g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.type = i % 2 === 0 ? 'sine' : 'triangle';
o.frequency.setValueAtTime(f, now + i * 0.08);
g.gain.setValueAtTime(0.2, now + i * 0.08);
g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
o.start(now + i * 0.08); o.stop(now + 1.5);
});
}
} catch(e) {}
}

const s = state.chapterScores[ch.id] || 0;
const m = ch.ciphers.reduce((a,c)=>a+c.points,0);
rows += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:17px"><span>${ch.subtitle}: ${ch.title}</span><span style="color:var(--accent)">${s}/${m}</span></div>`;
});
document.getElementById('final-chapter-scores').innerHTML = rows;
setTimeout(() => document.getElementById('final-stars').classList.add('show'), 800);
setTimeout(() => playSound('game_win'), 300);
setTimeout(() => launchConfetti(1500, 40), 500);
showScreen('s-final');
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(text, duration = 2500) {
const old = document.getElementById('game-toast');
if (old) old.remove();
const toast = document.createElement('div');
toast.id = 'game-toast';
toast.textContent = text;
toast.style.cssText = `position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(20,17,8,.95); border:1px solid rgba(255,224,51,.3); color:#ffe033; padding:8px 20px; border-radius:20px; font-family:var(--head); font-size:12px; z-index:999; pointer-events:none; opacity:0; transition:opacity .3s;`;
document.body.appendChild(toast);
requestAnimationFrame(() => { toast.style.opacity = '1'; });
setTimeout(() => {
toast.style.opacity = '0';
setTimeout(() => toast.remove(), 300);
}, duration);
}

// ═══════════════════════════════════════════════════════
//  SPLASH
// ═══════════════════════════════════════════════════════
function showSplash() {
const splash = document.getElementById('splash-screen');
let pct = 0;
const bar = splash.querySelector('#splash-bar');
const interval = setInterval(() => {
pct += Math.random() * 15;
if (pct >= 100) {
pct = 100;
clearInterval(interval);
}
bar.style.width = pct + '%';
if (pct >= 100) {
setTimeout(() => {
splash.style.opacity = '0';
setTimeout(() => splash.remove(), 500);
}, 200);
}
}, 80);
// Timeout fallback - force show after 5 seconds
setTimeout(() => {
if (splash && splash.parentNode) {
splash.style.opacity = '0';
setTimeout(() => { if (splash.parentNode) splash.remove(); }, 500);
}
}, 5000);
}

// ═══════════════════════════════════════════════════════
//  3D INTRO
// ═══════════════════════════════════════════════════════
function init3DIntro() {
const canvas = document.getElementById('three-canvas');
if (!canvas || typeof THREE === 'undefined') return;
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
camera.position.set(0, 0, 5);
const cube = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 1.6), new THREE.MeshBasicMaterial({ color: 0xffe033, wireframe: true, transparent: true, opacity: 0.28 }));
scene.add(cube);
const cube2 = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 2.8), new THREE.MeshBasicMaterial({ color: 0xff3a3a, wireframe: true, transparent: true, opacity: 0.09 }));
scene.add(cube2);
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.007, 2, 64), new THREE.MeshBasicMaterial({ color: 0xffe033, transparent: true, opacity: 0.18 }));
ring1.rotation.x = Math.PI / 3;
scene.add(ring1);
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(3.1, 0.004, 2, 64), new THREE.MeshBasicMaterial({ color: 0xff3a3a, transparent: true, opacity: 0.1 }));
ring2.rotation.y = Math.PI / 4;
scene.add(ring2);
const ptPos = new Float32Array(150 * 3);
for (let i = 0; i < ptPos.length; i++) ptPos[i] = (Math.random() - 0.5) * 12;
const ptGeo = new THREE.BufferGeometry();
ptGeo.setAttribute('position', new THREE.BufferAttribute(ptPos, 3));
const points = new THREE.Points(ptGeo, new THREE.PointsMaterial({ color: 0xffe033, size: 0.045, transparent: true, opacity: 0.55 }));
scene.add(points);
window.addEventListener('resize', () => {
renderer.setSize(window.innerWidth, window.innerHeight);
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
});
let active = true;
const introEl = document.getElementById('s-intro');
new MutationObserver(() => {
active = introEl.classList.contains('active');
}).observe(introEl, { attributes: true, attributeFilter: ['class'] });
let f = 0;
(function loop() {
requestAnimationFrame(loop);
if (!active) return;
f++;
const t = f * 0.008;
cube.rotation.x = t * 0.7;
cube.rotation.y = t;
cube2.rotation.x = -t * 0.4;
cube2.rotation.y = t * 0.5;
ring1.rotation.z = t * 0.3;
ring2.rotation.x = t * 0.2;
points.rotation.y = t * 0.1;
camera.position.x = Math.sin(t * 0.3) * 0.3;
camera.position.y = Math.cos(t * 0.2) * 0.15;
renderer.render(scene, camera);
})();
}

// ═══════════════════════════════════════════════════════
//  FIREWORKS
// ═══════════════════════════════════════════════════════
(function initFireworks(){
const c = document.getElementById('fireworks-canvas');
if(!c) return;
const ctx = c.getContext('2d');
function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const COLORS = ['#ff4422','#ff8800','#ffcc00','#ffe033','#ffffff'];
let rockets = [], particles = [], frame = 0;
let active = true;
const intro = document.getElementById('s-intro');
new MutationObserver(()=>{ active = intro.classList.contains('active'); }).observe(intro, {attributes:true, attributeFilter:['class']});
function spawnRocket(){
rockets.push({
x: c.width * (.2 + Math.random() * .6),
y: c.height,
tx: c.width * (.1 + Math.random() * .8),
ty: c.height * (.1 + Math.random() * .45),
color: COLORS[Math.floor(Math.random()*COLORS.length)],
trail: []
});
}
function explode(r){
const n = 60 + Math.floor(Math.random()*50);
for(let i=0;i<n;i++){
const angle = (Math.PI*2/n)*i + Math.random()*0.3;
const speed = 1.5 + Math.random()*2.5;
particles.push({
x:r.tx, y:r.ty,
vx: Math.cos(angle)*speed,
vy: Math.sin(angle)*speed,
color: r.color,
life: 1,
decay: .012 + Math.random()*0.018,
size: 2 + Math.random()*2
});
}
}
function draw(){
requestAnimationFrame(draw);
if(!active){ ctx.clearRect(0,0,c.width,c.height); return; }
ctx.fillStyle='rgba(0,0,0,.18)';
ctx.fillRect(0,0,c.width,c.height);
frame++;
if(frame > 60 && frame % 90 === 0) spawnRocket();
rockets = rockets.filter(r=>{
r.trail.push({x:r.x,y:r.y});
if(r.trail.length>12) r.trail.shift();
const dx=r.tx-r.x, dy=r.ty-r.y;
const dist=Math.sqrt(dx*dx+dy*dy);
if(dist < 5){ explode(r); return false; }
const speed = Math.min(dist*.12, 14);
r.x += dx/dist*speed; r.y += dy/dist*speed;
r.trail.forEach((pt,i)=>{
const a = (i/r.trail.length)*.8;
ctx.beginPath();
ctx.arc(pt.x,pt.y,1.5,0,Math.PI*2);
ctx.fillStyle = r.color;
ctx.globalAlpha = a;
ctx.fill();
});
ctx.globalAlpha=1;
ctx.beginPath();
ctx.arc(r.x,r.y,3,0,Math.PI*2);
ctx.fillStyle='#fff';
ctx.fill();
return true;
});
particles = particles.filter(p=>{
p.x+=p.vx; p.y+=p.vy;
p.vy+=.04;
p.vx*=.97; p.vy*=.97;
p.life-=p.decay;
if(p.life<=0) return false;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.globalAlpha=p.life*.9;
ctx.fill();
ctx.globalAlpha=1;
return true;
});
}
draw();
})();

// ═══════════════════════════════════════════════════════
//  PETALS
// ═══════════════════════════════════════════════════════
(function initPetals(){
const c = document.getElementById('petals-canvas');
if(!c) return;
const ctx = c.getContext('2d');
function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const PCOLORS = ['#cc2211','#dd3322','#ee4433','#ffffff','#ffeeee','#cc1133'];
let petals=[], active=true;
const intro = document.getElementById('s-intro');
new MutationObserver(()=>{ active = intro.classList.contains('active'); }).observe(intro, {attributes:true, attributeFilter:['class']});
for(let i=0;i<28;i++){
petals.push({
x: Math.random()*window.innerWidth,
y: Math.random()*window.innerHeight - window.innerHeight,
r: 3+Math.random()*5,
vx: (Math.random()-.5)*0.6,
vy: 0.4+Math.random()*0.7,
rot: Math.random()*Math.PI*2,
rotV: (Math.random()-.5)*0.06,
color: PCOLORS[Math.floor(Math.random()*PCOLORS.length)],
wobble: Math.random()*Math.PI*2,
wobbleS: 0.02+Math.random()*0.03
});
}
function drawPetal(p){
ctx.save();
ctx.translate(p.x, p.y);
ctx.rotate(p.rot);
ctx.beginPath();
ctx.ellipse(0, 0, p.r, p.r*1.8, 0, 0, Math.PI*2);
ctx.fillStyle = p.color;
ctx.globalAlpha = .75;
ctx.fill();
ctx.beginPath();
ctx.ellipse(-p.r*.2, -p.r*.3, p.r*.3, p.r*.5, -.5, 0, Math.PI*2);
ctx.fillStyle = 'rgba(255,255,255,.3)';
ctx.fill();
ctx.restore();
ctx.globalAlpha=1;
}
function loop(){
requestAnimationFrame(loop);
if(!active){ ctx.clearRect(0,0,c.width,c.height); return; }
ctx.clearRect(0,0,c.width,c.height);
petals.forEach(p=>{
p.wobble += p.wobbleS;
p.x += p.vx + Math.sin(p.wobble)*0.5;
p.y += p.vy;
p.rot += p.rotV;
if(p.y > c.height+20){
p.y = -20; p.x = Math.random()*c.width;
p.color = PCOLORS[Math.floor(Math.random()*PCOLORS.length)];
}
drawPetal(p);
});
}
loop();
})();

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
(function initParticles(){
const c = document.getElementById('particles-canvas');
if(!c) return;
const ctx = c.getContext('2d');
let W, H, pts = [];
function resize(){
W = c.width = window.innerWidth;
H = c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
const CHARS = '01-./·•✦АБВ'.split('');
for(let i=0;i<55;i++) pts.push({
x: Math.random()*window.innerWidth,
y: Math.random()*window.innerHeight,
s: Math.random()*10+8,
v: Math.random()*0.4+0.1,
o: Math.random()*0.5+0.1,
c: CHARS[Math.floor(Math.random()*CHARS.length)]
});
function draw(){
ctx.clearRect(0,0,W,H);
ctx.font = '12px monospace';
pts.forEach(p=>{
ctx.globalAlpha = p.o;
ctx.fillStyle = '#ffe033';
ctx.fillText(p.c, p.x, p.y);
p.y += p.v;
if(p.y > H+20){ p.y=-20; p.x=Math.random()*W; p.c=CHARS[Math.floor(Math.random()*CHARS.length)]; }
});
ctx.globalAlpha = 1;
requestAnimationFrame(draw);
}
draw();
})();
